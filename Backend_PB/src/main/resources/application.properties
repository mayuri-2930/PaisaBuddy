spring.application.name=paisabuddy
server.port=${SERVER_PORT:8081}

# Default to an embedded H2 database for local development so the app can
# start without any external services. Override these env vars to use MySQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/paisabuddy;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
